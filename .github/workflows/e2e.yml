name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Start a minimal HTTP server on port 11434 to satisfy LLM connectivity
        run: |
          # Serve a small JSON endpoint on port 11434. The E2E tests only check that
          # the port is open; a simple server is sufficient.
          nohup bash -c "printf 'HTTP/1.1 200 OK\nContent-Type: application/json\n\n{}' > /tmp/llm_stub_response && while true; do nc -l 11434 < /tmp/llm_stub_response; done" &

      - name: Run E2E tests
        run: npm run e2e
        env:
          # Ensure replay agent is the default in CI to avoid external LLM calls
          AGENT: agent-replay
          LLM_ENDPOINT: http://localhost:11434/v1
          LLM_MODEL: gpt-oss:20b
          DEBUG_CODEX: '1'

      - name: Upload E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: |
            ./.e2e/**
            ./**/.agent/**
